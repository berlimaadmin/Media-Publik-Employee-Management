<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Publik Employee Management</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f7fa;
            margin:0;
            padding:0;
        }

        .container{
            max-width:1000px;
            margin:auto;
            padding:50px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.1);
        }

        h1{
            color:#2c3e50;
        }

        .badge{
            display:inline-block;
            background:#0d6efd;
            color:white;
            padding:8px 15px;
            border-radius:20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <span class="badge">Media Publik</span>

        <h1>Employee Management System</h1>

        <p>
            Sistem manajemen pegawai untuk mengelola:
        </p>

        <ul>
            <li>Data Pegawai</li>
            <li>Absensi</li>
            <li>Jadwal Kerja</li>
            <li>Project List</li>
            <li>Project Report</li>
            <li>Daily Project Report</li>
        </ul>

        <p>
            Website berhasil berjalan melalui GitHub Pages.
        </p>
    </div>
</div>

</body>
</html>
